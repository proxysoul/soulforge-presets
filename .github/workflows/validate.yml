name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ajv
        run: npm install --no-save ajv-cli@5 ajv-formats@3
      - name: Validate presets
        run: npx ajv-cli validate -s schema.json -d "presets/*/preset.json" --strict=false
      - name: Check registry matches folders
        run: node .github/scripts/check-registry.js
